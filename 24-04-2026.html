<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1e1e2f;
            font-family: sans-serif;
        }

        .calculator {
            background: #2c2c3e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        #display {
            width: 290px; /* Adjusted to fit the button grid */
            height: 60px;
            font-size: 24px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-align: right;
            padding: 10px;
            border: none;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            background: #eee;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            background: #444;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #666;
        }

        /* Targets every 4th button (operators) */
        button:nth-child(4n), .equal-btn {
            background: orange;
        }

        /* Makes the Clear button span across the bottom */
        .clear-btn {
            grid-column: span 4;
            background: #e74c3c;
        }
        
        button:nth-child(4n):hover, .equal-btn:hover {
            background: #ffae1a;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled />

        <div class="buttons">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">÷</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">×</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">−</button>

            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button class="equal-btn" onclick="calculate()">=</button>
            <button onclick="press('+')">+</button>

            <button class="clear-btn" onclick="clearDisplay()">C</button>
        </div>
    </div>

    <script>
        let display = document.getElementById("display");
        function press(value) {
            display.value += value;
        }
        function clearDisplay() {
            display.value = "";
        }
        function calculate() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
            }
        }
    </script>
</body>
</html>
