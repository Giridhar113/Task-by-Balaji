<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStream · Course Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1eb;
  --surface: #fffef9;
  --surface2: #f0ede4;
  --text: #1a1714;
  --text2: #6b6560;
  --text3: #a09a94;
  --primary: #d4501a;
  --primary-hover: #b8421a;
  --accent: #2d6a4f;
  --accent2: #e9c46a;
  --border: #ddd9cf;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --radius: 14px;
  --radius-sm: 8px;
  --full-tag: #fee2e2;
  --full-text: #b91c1c;
  --open-tag: #dcfce7;
  --open-text: #15803d;
}



*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow);
}

.header-inner {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0.9rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  color: var(--primary);
  letter-spacing: -0.03em;
  white-space: nowrap;
}

.logo span { color: var(--text2); font-weight: 600; font-size: 0.875rem; margin-left: 0.4rem; }

#courseCount {
  background: var(--primary);
  color: white;
  padding: 0.2rem 0.65rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex: 1;
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* Search */
.search-wrap {
  position: relative;
  min-width: 200px;
  flex: 1;
  max-width: 300px;
}
.search-wrap svg {
  position: absolute; left: 0.8rem; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 0.6rem 0.9rem 0.6rem 2.4rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(212,80,26,0.12); }

/* Filters row */
select, .filter-select {
  padding: 0.6rem 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
select:focus { border-color: var(--primary); }

.available-check {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  font-size: 0.875rem;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
}
.available-check input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--primary);
  cursor: pointer;
}



/* ── TOOLBAR ── */
.toolbar {
  max-width: 1300px;
  margin: 1.25rem auto 0;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.toolbar-left { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; flex: 1; }

.btn-add {
  background: var(--primary);
  color: white;
  border: none;
  padding: 0.6rem 1.1rem;
  border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif;
  font-size: 0.875rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 0.4rem;
  transition: background 0.2s, transform 0.15s;
  box-shadow: 0 2px 8px rgba(212,80,26,0.25);
}
.btn-add:hover { background: var(--primary-hover); transform: translateY(-1px); }

/* ── GRID ── */
main {
  max-width: 1300px;
  margin: 1.5rem auto;
  padding: 0 1.5rem 3rem;
}

#courseGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
}

.course-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.2s;
  animation: fadeIn 0.35s ease both;
}
.course-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary);
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.9rem;
}

.dept-tag {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text3);
}

.status-tag {
  font-size: 0.65rem;
  font-weight: 800;
  padding: 0.15rem 0.55rem;
  border-radius: 6px;
}
.tag-open { background: var(--open-tag); color: var(--open-text); }
.tag-full { background: var(--full-tag); color: var(--full-text); }

.course-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  line-height: 1.3;
  margin-bottom: 0.5rem;
  color: var(--text);
}

.faculty-row {
  font-size: 0.8rem;
  color: var(--text2);
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: 0.35rem;
}

.card-footer {
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.seats-info { display: flex; flex-direction: column; }
.seats-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); }
.seats-val { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.seats-val.danger { color: var(--full-text); }

.btn-enroll {
  background: var(--primary);
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.btn-enroll:hover:not(:disabled) { background: var(--primary-hover); transform: scale(1.04); }
.btn-enroll:disabled {
  background: var(--surface2);
  color: var(--text3);
  border: 1.5px solid var(--border);
  cursor: not-allowed;
}

/* Highlight */
mark {
  background: rgba(212,80,26,0.18);
  color: var(--primary);
  border-radius: 3px;
  padding: 0 1px;
}


/* ── PAGINATION ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-top: 2rem;
  flex-wrap: wrap;
}

.page-btn {
  width: 36px; height: 36px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-size: 0.875rem;
  font-weight: 700;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── MODALS ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fadeOverlay 0.2s ease;
}
@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: 1.25rem;
  padding: 2rem;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(30px) scale(0.97); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

.modal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.25rem;
  margin-bottom: 0.35rem;
  color: var(--text);
}

.modal-sub {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 1.5rem;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 0.65rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.875rem;
}
.detail-row:last-of-type { border-bottom: none; }
.detail-row span:first-child { color: var(--text2); }
.detail-row span:last-child { font-weight: 600; color: var(--text); }

.modal-actions { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 1.5rem; }

.btn-confirm {
  background: var(--primary);
  color: white;
  border: none;
  padding: 0.85rem;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-confirm:hover { background: var(--primary-hover); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1.5px solid var(--border);
  padding: 0.85rem;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: border-color 0.2s;
}
.btn-secondary:hover { border-color: var(--primary); }

/* Form */
.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 0.35rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 0.65rem 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

/* Toast */
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--surface);
  padding: 0.75rem 1.5rem;
  border-radius: 999px;
  font-family: 'Syne', sans-serif;
  font-size: 0.875rem;
  font-weight: 700;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Empty state */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text3);
}
.empty svg { margin-bottom: 1rem; opacity: 0.5; }
.empty h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--text2); margin-bottom: 0.35rem; }

/* Progress bar for seats */
.seats-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; margin: 0.6rem 0 0; overflow: hidden; }
.seats-bar { height: 100%; border-radius: 99px; transition: width 0.4s; }
.bar-ok { background: var(--accent); }
.bar-low { background: var(--accent2); }
.bar-full { background: var(--full-text); }

footer {
  text-align: center;
  padding: 2rem;
  font-size: 0.8rem;
  color: var(--text3);
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <div class="logo">EduStream <span>University Portal</span></div>
      <span id="courseCount">0 Courses</span>
    </div>
    <div class="header-controls">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search courses, faculty…">
      </div>
      <select id="deptFilter">
        <option value="">All Departments</option>
        <option>Computer Science</option>
        <option>English</option>
        <option>Business</option>
        <option>Science</option>
        <option>Digital Arts</option>
        <option>Law</option>
        <option>Medicine</option>
      </select>
      <select id="sortFilter">
        <option value="">Sort by</option>
        <option value="seats-asc">Seats: Low → High</option>
        <option value="seats-desc">Seats: High → Low</option>
        <option value="name-asc">Name A → Z</option>
      </select>
      <label class="available-check">
        <input type="checkbox" id="availableOnly"> Available only
      </label>

    </div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn-add" onclick="openAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Course
    </button>
  </div>
</div>

<main>
  <div id="courseGrid"></div>
  <div id="pagination" class="pagination"></div>
</main>

<footer>&copy; 2024 Global University Integrated Systems · Real-time enrollment enabled</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const DEPTS = ["Computer Science","English","Business","Science","Digital Arts","Law","Medicine"];

const DEFAULT_COURSES = [
  { id: 101, title: "Neural Networks 101", dept: "Computer Science", seats: 12, max: 50, faculty: "Dr. Aris", year: "3rd Year" },
  { id: 102, title: "Modernist Literature", dept: "English", seats: 0, max: 30, faculty: "Prof. Sterling", year: "2nd Year" },
  { id: 103, title: "Macroeconomics", dept: "Business", seats: 45, max: 100, faculty: "Prof. Zhang", year: "1st Year" },
  { id: 104, title: "Inorganic Chemistry", dept: "Science", seats: 5, max: 40, faculty: "Dr. Kovac", year: "2nd Year" },
  { id: 105, title: "UI/UX Design Systems", dept: "Digital Arts", seats: 2, max: 15, faculty: "Prof. Miller", year: "3rd Year" },
  { id: 106, title: "Criminal Law Foundations", dept: "Law", seats: 25, max: 30, faculty: "Judge Rehnquist", year: "4th Year" },
  { id: 107, title: "Astrophysics II", dept: "Science", seats: 0, max: 12, faculty: "Dr. Tyson", year: "4th Year" },
  { id: 108, title: "Public Health Policy", dept: "Medicine", seats: 80, max: 120, faculty: "Dr. Fauci", year: "Postgrad" }
];

const PER_PAGE = 6;
let currentPage = 1;
let courses = [];
let filteredCourses = [];

// ── LOCAL STORAGE ──
function saveToStorage() {
  localStorage.setItem('edustream_courses', JSON.stringify(courses));
}
function loadFromStorage() {
  const saved = localStorage.getItem('edustream_courses');
  return saved ? JSON.parse(saved) : null;
}

function init() {
  const saved = loadFromStorage();
  courses = saved || JSON.parse(JSON.stringify(DEFAULT_COURSES));
  if (!saved) saveToStorage();
  applyFilters();
}

// ── FILTERS & SEARCH ──
function applyFilters() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const dept = document.getElementById('deptFilter').value;
  const sort = document.getElementById('sortFilter').value;
  const availOnly = document.getElementById('availableOnly').checked;

  filteredCourses = courses.filter(c => {
    const matchQ = !query || c.title.toLowerCase().includes(query) || c.dept.toLowerCase().includes(query) || c.faculty.toLowerCase().includes(query);
    const matchD = !dept || c.dept === dept;
    const matchA = !availOnly || c.seats > 0;
    return matchQ && matchD && matchA;
  });

  if (sort === 'seats-asc') filteredCourses.sort((a,b) => a.seats - b.seats);
  else if (sort === 'seats-desc') filteredCourses.sort((a,b) => b.seats - a.seats);
  else if (sort === 'name-asc') filteredCourses.sort((a,b) => a.title.localeCompare(b.title));

  currentPage = 1;
  renderPage();
}

function renderPage() {
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = '';
  document.getElementById('courseCount').textContent = `${filteredCourses.length} Course${filteredCourses.length !== 1 ? 's' : ''}`;

  if (filteredCourses.length === 0) {
    grid.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h3>No courses found</h3><p>Try adjusting your filters or search terms.</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(filteredCourses.length / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const pageItems = filteredCourses.slice(start, start + PER_PAGE);
  const query = document.getElementById('searchInput').value.trim();

  pageItems.forEach((c, i) => {
    const isFull = c.seats <= 0;
    const pct = Math.round((c.seats / c.max) * 100);
    const barClass = pct === 0 ? 'bar-full' : pct < 20 ? 'bar-low' : 'bar-ok';
    const card = document.createElement('div');
    card.className = 'course-card';
    card.style.animationDelay = `${i * 0.05}s`;
    card.onclick = (e) => { if (!e.target.closest('.btn-enroll')) openDetailModal(c.id); };

    card.innerHTML = `
      <div class="card-top">
        <span class="dept-tag">${highlight(c.dept, query)}</span>
        <span class="status-tag ${isFull ? 'tag-full' : 'tag-open'}">${isFull ? 'FULL' : 'OPEN'}</span>
      </div>
      <h3 class="course-title">${highlight(c.title, query)}</h3>
      <p class="faculty-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${highlight(c.faculty, query)}
      </p>
      <div class="card-footer">
        <div class="seats-info">
          <span class="seats-label">Seats</span>
          <span class="seats-val ${isFull ? 'danger' : ''}">${isFull ? 'Waitlist' : `${c.seats} / ${c.max}`}</span>
          <div class="seats-bar-wrap"><div class="seats-bar ${barClass}" style="width:${pct}%"></div></div>
        </div>
        <button class="btn-enroll" ${isFull ? 'disabled' : ''} onclick="enrollCourse(${c.id})">
          ${isFull ? 'Full' : 'Enroll'}
        </button>
      </div>`;
    grid.appendChild(card);
  });

  renderPagination(totalPages);
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// ── PAGINATION ──
function renderPagination(total) {
  const el = document.getElementById('pagination');
  el.innerHTML = '';
  if (total <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.innerHTML = '&#8592;';
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; renderPage(); };
  el.appendChild(prev);

  for (let i = 1; i <= total; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i;
    btn.onclick = ((p) => () => { currentPage = p; renderPage(); })(i);
    el.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.innerHTML = '&#8594;';
  next.disabled = currentPage === total;
  next.onclick = () => { currentPage++; renderPage(); };
  el.appendChild(next);
}

// ── ENROLL ──
function enrollCourse(id) {
  const c = courses.find(x => x.id === id);
  if (!c || c.seats <= 0) return;
  c.seats--;
  applyFilters();
  showToast(`✓ Enrolled in "${c.title}"`);
}

// ── DETAIL MODAL ──
function openDetailModal(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  const isFull = c.seats <= 0;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem">
        <div>
          <div class="modal-title">${c.title}</div>
          <div class="modal-sub">${c.dept} · ${c.year}</div>
        </div>
        <span class="status-tag ${isFull ? 'tag-full' : 'tag-open'}" style="margin-top:4px">${isFull ? 'FULL' : 'OPEN'}</span>
      </div>
      <div class="detail-row"><span>Faculty</span><span>${c.faculty}</span></div>
      <div class="detail-row"><span>Department</span><span>${c.dept}</span></div>
      <div class="detail-row"><span>Year Level</span><span>${c.year}</span></div>
      <div class="detail-row"><span>Available Seats</span><span style="color:${isFull ? 'var(--full-text)' : 'var(--open-text)'}">${c.seats} of ${c.max}</span></div>
      <div class="detail-row"><span>Status</span><span>${isFull ? 'Full – Waitlist available' : 'Open for enrollment'}</span></div>
      <div class="modal-actions">
        <button class="btn-confirm" ${isFull ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''} onclick="enrollCourse(${c.id});this.closest('.overlay').remove()">
          ${isFull ? 'Course Full' : 'Enroll Now'}
        </button>
        <button class="btn-secondary" onclick="this.closest('.overlay').remove()">Close</button>
      </div>
    </div>`;
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

// ── ADD COURSE MODAL ──
function openAddModal() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Add New Course</div>
      <div class="modal-sub">Fill in the details to add a course to the catalog.</div>
      <div class="form-group"><label>Course Title *</label><input id="f-title" placeholder="e.g. Data Structures"></div>
      <div class="form-group"><label>Faculty *</label><input id="f-faculty" placeholder="e.g. Dr. Smith"></div>
      <div class="form-group"><label>Department</label>
        <select id="f-dept">${DEPTS.map(d => `<option>${d}</option>`).join('')}</select>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Seats *</label><input id="f-seats" type="number" min="0" placeholder="30"></div>
        <div class="form-group"><label>Max Seats *</label><input id="f-max" type="number" min="1" placeholder="50"></div>
      </div>
      <div class="form-group"><label>Year Level</label>
        <select id="f-year"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>Postgrad</option></select>
      </div>
      <div class="modal-actions">
        <button class="btn-confirm" onclick="submitNewCourse(this)">Add Course</button>
        <button class="btn-secondary" onclick="this.closest('.overlay').remove()">Cancel</button>
      </div>
    </div>`;
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

function submitNewCourse(btn) {
  const title = document.getElementById('f-title').value.trim();
  const faculty = document.getElementById('f-faculty').value.trim();
  const dept = document.getElementById('f-dept').value;
  const seats = parseInt(document.getElementById('f-seats').value);
  const max = parseInt(document.getElementById('f-max').value);
  const year = document.getElementById('f-year').value;

  if (!title || !faculty || isNaN(seats) || isNaN(max) || max < 1 || seats < 0) {
    showToast('⚠ Please fill all required fields correctly'); return;
  }
  if (seats > max) { showToast('⚠ Seats cannot exceed max seats'); return; }

  const newId = Math.max(...courses.map(c => c.id)) + 1;
  courses.push({ id: newId, title, dept, seats, max, faculty, year });
  btn.closest('.overlay').remove();
  applyFilters();
  showToast(`✓ "${title}" added to catalog`);
}

// ── DARK MODE ──
function toggleDark() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('edustream_theme', isDark ? 'light' : 'dark');
  document.getElementById('darkIcon').innerHTML = isDark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── EVENT LISTENERS ──
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('deptFilter').addEventListener('change', applyFilters);
document.getElementById('sortFilter').addEventListener('change', applyFilters);
document.getElementById('availableOnly').addEventListener('change', applyFilters);

// restore theme
const savedTheme = localStorage.getItem('edustream_theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('darkIcon').innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}

init();
</script>
</body>
</html>
